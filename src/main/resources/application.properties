spring.application.name=book-ride



spring.datasource.url= jdbc:postgresql://localhost:5439/book_ride?autoReconnect=true&useUnicode=yes&characterEncoding=UTF-8&readFromSourceWhenNoReplicas=true
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.data.jpa.repositories.bootstrap-mode=default
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.minimum-idle=10
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE


spring.jpa.hibernate.ddl-auto=validate

# Show SQL statements in console (optional, for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



logging.level.org.springframework.messaging=TRACE
logging.level.org.springframework.web.socket=TRACE

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
